apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-app
  namespace: campus-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-app
  template:
    metadata:
      labels:
        app: ai-app
    spec:
      containers:
      - name: ai-app
        image: us-west1-docker.pkg.dev/gke-gemini-demo/gke-ai-demo-repo/gke-ai-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: GEMINI_API_KEY
          value: "<API_KEY>"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
